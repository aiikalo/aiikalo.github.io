<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Lernprojekt</title>
    <link rel="stylesheet" href="stlye.css">
</head>
<body>

<header>
    <h1>Mein Lernprojekt</h1>
    <p class="intro">Hier lernen Sie, wie Sie ihr Handy nutzen könnt!</p>
</header>

<main>

    <!-- Kacheln / Navigation -->
    <section aria-labelledby="navigation">
        <h2 id="navigation">Lernbereiche</h2>

        <div class="grid">
            <!-- 10 Kacheln -->
            <a href="seite1.html" class="tile">
                Thema 1
                <span class="tile-desc">Text 1</span>
            </a>
            <a href="seite2.html" class="tile">
                Thema 2
                <span class="tile-desc">Text 2</span>
            </a>
            <a href="seite3.html" class="tile">
                Thema 3
                <span class="tile-desc">Text 3</span>
            </a>
            <a href="seite4.html" class="tile">
                Thema 4
                <span class="tile-desc">Text 4</span>
            </a>
            <a href="seite5.html" class="tile">
                Thema 5
                <span class="tile-desc">Text 5</span>
            </a>
            <a href="seite6.html" class="tile">
                Thema 6
                <span class="tile-desc">Text 6</span>
            </a>
            <a href="seite7.html" class="tile">
                Thema 7
                <span class="tile-desc">Text 7</span>
            </a>
            <a href="seite8.html" class="tile">
                Thema 8
                <span class="tile-desc">Text 8</span>
            </a>
            <a href="seite9.html" class="tile">
                Thema 9
                <span class="tile-desc">Text 9</span>
            </a>
            <a href="seite10.html" class="tile">
                Thema 10
                <span class="tile-desc">Text 10</span>
            </a>
        </div>
    </section>

    <!-- Übungen -->
    <section aria-labelledby="uebungen">
        <h2 id="uebungen">Hier geht es zu den Übungen</h2>

        <div class="h5p-container">
            <iframe src="https://app.lumi.education/api/v1/run/043sRT/embed" title="Übung 1"></iframe>
        </div>

        <div class="h5p-container">
            <iframe src="https://app.lumi.education/api/v1/run/043sRT/embed" title="Übung 2"></iframe>
        </div>
    </section>

    <!-- Podcast -->
    <section aria-labelledby="podcast">
        <h2 id="podcast">Podcast</h2>

        <div class="audio-player">
            <button id="playBtn" aria-label="Podcast abspielen">▶️</button>
            <audio id="audio" src="podcast.mp3"></audio>
        </div>
    </section>

</main>

<script>
    const btn = document.getElementById("playBtn");
    const audio = document.getElementById("audio");

    btn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play();
            btn.textContent = "⏸️";
        } else {
            audio.pause();
            btn.textContent = "▶️";
        }
    });
</script>

</body>
</html>
